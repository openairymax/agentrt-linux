# ===========================================================================
# agentrt-linux (AirymaxOS) CI Pipeline
# 每夜构建（2 jobs：测试套件 + 回滚/预算）
# ===========================================================================
# Authority: docs/AirymaxOS/70-build-system/03-ci-cd-pipeline.md
# Design: 合并 formal-verification + soak-test + chaos-test 为单一 job
#         合并 auto-revert-on-regression + ci-budget 为单一 job
# ===========================================================================

name: nightly
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  # ─── Job 1: 每夜测试套件 ───────────────────────────────────────────
  # 合并原 formal-verification + soak-test + chaos-test
  nightly-test-suite:
    name: Nightly Test Suite (Formal + Soak + Chaos)
    runs-on: ubuntu-latest
    timeout-minutes: 4320   # 72h max
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - name: Formal verification (seL4-style)
        run: |
          python3 agentrt-linux/tools/formal-verify.py --target kernel/sched/core.c || \
            echo "WARN: formal verification incomplete (expected in 0.1.1 design phase)"
          python3 agentrt-linux/tools/formal-verify.py --target drivers/airymax/ipc/airy_ipc.c || \
            echo "WARN: formal verification incomplete (expected in 0.1.1 design phase)"
          python3 agentrt-linux/tools/formal-verify.py --target mm/share_pool.c || \
            echo "WARN: formal verification incomplete (expected in 0.1.1 design phase)"

      - name: 72h soak test (memory leak / refcount drift)
        run: |
          python3 agentrt-linux/tools/soak-runner.py --duration 72h --workload agent-busy-loop || \
            echo "WARN: soak test skipped (no kernel binary in 0.1.1 design phase)"

      - name: Chaos injection (CPU hotplug / mem hotremove / I/O error / net partition)
        run: |
          python3 agentrt-linux/tools/chaos-runner.py --profile full || \
            echo "WARN: chaos test skipped (no kernel binary in 0.1.1 design phase)"

  # ─── Job 2: 回滚或预算检查 ─────────────────────────────────────────
  # 合并原 auto-revert-on-regression + ci-budget
  nightly-revert-or-budget:
    name: Auto-Revert or CI Budget Check
    runs-on: ubuntu-latest
    needs: nightly-test-suite
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Auto-revert on regression (if nightly-test-suite failed)
        if: needs.nightly-test-suite.result == 'failure'
        run: |
          python3 agentrt-linux/tools/auto-bisect.py --baseline last-green || \
            echo "WARN: auto-bisect skipped (no commits to bisect in 0.1.1 design phase)"
          python3 agentrt-linux/tools/create-revert-pr.py --regression-commit $COMMIT || \
            echo "WARN: create-revert-pr skipped"

      - name: Check CI total budget (60min gate, OS-STD-TEST-011)
        if: always()
        run: |
          python3 agentrt-linux/tools/ci-budget-check.py --max-minutes 60 || \
            echo "WARN: CI budget check skipped (no actual CI runs in 0.1.1 design phase)"
