      - { id: OS-IRON-009, desc: "代码共享边界：仅 agentrt ↔ AirymaxOS", section: "120 / 07 §1.4", status: active }
      - { id: OS-IRON-010, desc: "Linux 6.6 为基、seL4 为鉴工程取向", section: "04 §12", status: active }
      - { id: OS-IRON-011, desc: "双源边界声明", section: "04 §12", status: active }
      - { id: OS-IRON-012, desc: "seL4 借鉴仅限架构层", section: "04 §12", status: active }
      - { id: OS-IRON-013, desc: "8 子仓独立 git 仓库 + submodule", section: "04 §13", status: active }
      - { id: OS-IRON-014, desc: "[SC] 共享契约层 10 个头文件单一数据源", section: "120", status: active }
      - { id: OS-IRON-015, desc: "编号管理元规则——编号一经分配不得复用", section: "90-obs/02 §14.2", status: active }
      - { id: OS-IRON-016, desc: "UAPI 头文件编译器无关原则", section: "04 §2.4", status: active }

