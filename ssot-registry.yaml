# ===========================================================================
# agentrt-linux (AirymaxOS) + agentrt SSoT Rule ID Registry (YAML)
# ===========================================================================
# 机器可读 Schema — 管理仓根（agentrt-linux/ssot-registry.yaml）
# 权威 Markdown 源：docs/AirymaxOS/50-engineering-standards/09-ssot-registry.md
# OS-IRON-015: All rule IDs must be registered; deprecated IDs are
#              retained but marked as deprecated.
# Registration method (SSoT §1.5):
#   - full: enumerate every entry (≤30 rules)
#   - range: start~end expansion (>30 rules)
#   - individual: non-contiguous IDs listed individually
# ===========================================================================

version: "0.2.8"
last_updated: "2026-07-15"

